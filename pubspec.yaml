name: audio_app
description: A secure audio streaming app with biometric authentication.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Authentication & Security
  # Updated for compatibility with newer Gradle and Swift versions
  local_auth: ^2.3.0
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.0.2

  # Audio Playback
  # Just_audio 0.10.x handles the newer web interop much better
  just_audio: ^0.10.5
  audio_session: ^0.1.25
  flutter_beep: ^1.0.0
  app_settings: ^4.1.0

  # Charts & UI
  # Note: fl_chart 1.2.0 has some breaking API changes from 0.65.0
  fl_chart: ^1.2.0
  iconly: ^1.0.1

  # Local Storage
  shared_preferences: ^2.2.3

  # HTTP & API
  dio: ^5.4.3+1

  # State Management
  provider: ^6.1.2

  # UI & Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  # Crucial update for Flutter 3.10+ compatibility
  modal_bottom_sheet: ^3.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Updated lints to match the SDK
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
